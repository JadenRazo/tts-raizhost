apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts-kokoro
  namespace: tts
  labels:
    app.kubernetes.io/name: tts-kokoro
    app.kubernetes.io/component: tts
    app.kubernetes.io/part-of: tts-raizhost
spec:
  # Two replicas at 2 cores each = 4 cores total cap on the 8-core box.
  # Leaves the other 4 cores for raizhost-app, claude-tracker, k3s
  # control-plane, and the rest of the shared tenants. Kokoro v1.0 on
  # CPU runs at RTF ~1.0-1.5 per inference on 2 cores (slower than the
  # previous Piper medium tier, but voice quality is materially better
  # and the home-GPU offload covers the perf gap when available).
  # Two concurrent slots per pod, two replicas → 4 concurrent inferences
  # before 503 backpressure. Most user demand lands on the GPU path or
  # cache hits, so the CPU path is a fallback rather than the steady
  # state. Revisit replica count if `concurrent_in_flight` logs show
  # two replicas pegged.
  replicas: 2
  strategy:
    # RollingUpdate so a rollout doesn't take the service offline. With
    # maxSurge=0 we never exceed `replicas`, keeping memory bounded;
    # maxUnavailable=1 means one pod warms while the other still serves.
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tts-kokoro
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tts-kokoro
        app.kubernetes.io/component: tts
        app.kubernetes.io/part-of: tts-raizhost
      annotations:
        # OTel auto-instrumentation: the operator injects an init
        # container that wraps the Python runtime with the OTel SDK and
        # exports OTLP/HTTP traces to Tempo. See instrumentation.yaml.
        instrumentation.opentelemetry.io/inject-python: "tts/tts-python-instrumentation"
    spec:
      serviceAccountName: tts-kokoro
      automountServiceAccountToken: false
      # Long enough for an in-flight synthesis (~5 s for a paragraph) to
      # finish before SIGKILL during a rolling update. Default is 30 s
      # which can cut off long-sentence synths in the middle.
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kokoro
          image: tts-kokoro:v0.5.0
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            # Kokoro v1.0 model files directory. Bootstrap script
            # (scripts/bootstrap-models.sh) populates this with
            # kokoro-v1.0.onnx (the FP32 ONNX model) and voices-v1.0.bin
            # (numpy archive of all 54 voice tensors). synth.py advertises
            # only 4 English voices but loads the whole bin since there's
            # no per-voice slice.
            - name: KOKORO_MODELS_DIR
              value: /models/kokoro
            # Bound thread counts to match the 2-core CPU limit.
            # intra=2 = each ONNX op uses both cores in the cgroup;
            # one concurrent inference per pod by default keeps RTF
            # under 1.0 on the heavier Kokoro model (vs 2 with Piper
            # medium). The OMP/MKL/OpenBLAS variants pin underlying
            # numerical libs so they don't spawn N-core workers.
            - name: OMP_NUM_THREADS
              value: "2"
            - name: MKL_NUM_THREADS
              value: "2"
            - name: OPENBLAS_NUM_THREADS
              value: "2"
            - name: ORT_INTRA_OP_THREADS
              value: "2"
            - name: ORT_INTER_OP_THREADS
              value: "1"
            # One concurrent slot per pod for Kokoro. The model is
            # heavier than Piper medium (RTF ~1.0-1.5 on 2 cores vs
            # ~0.3-0.6); two parallel inferences would tip RTF above
            # 1.0 and cause stuttering. Two replicas → 2 total in-flight.
            - name: KOKORO_MAX_CONCURRENT_SYNTH
              value: "1"
            # Queue timeout. 200 ms absorbs micro-bursts (prefetch race,
            # multi-tab open) without immediately 503ing.
            - name: KOKORO_QUEUE_TIMEOUT_MS
              value: "200"
            # Skip auto-instrumenting libs we don't use, to shave the
            # auto-instrument boot cost and reduce span noise in Tempo.
            - name: OTEL_PYTHON_DISABLED_INSTRUMENTATIONS
              value: "urllib,boto3,botocore"
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              # 2-core cap per pod. With 2 replicas, total tts cap is
              # 4 cores on the 8-core box — leaves the other half for
              # raizhost-app, claude-tracker, k3s, and the rest of the
              # shared tenants.
              cpu: "2"
              # 2 GiB to fit Kokoro v1.0 (~330 MB ONNX + ~300 MB ORT
              # memory arena + ~100 MB voices.bin + ffmpeg subprocess +
              # Python runtime). Resident after warmup is ~700-900 MB;
              # the 2 GiB ceiling absorbs the worst-case ORT pattern
              # cache growth on long inputs. Bump if RSS climbs above
              # ~1.5 GB sustained.
              memory: 2Gi
          # Lazy-load: /healthz answers immediately even before the model is in
          # memory, so liveness has a generous startup window. Readiness gates
          # traffic — but since /healthz returns ok=true with model_loaded=false
          # before first synth, we accept "ready" before the model is loaded
          # too; the first synth pays the load cost (~5s on cold start).
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: models
          hostPath:
            # Kokoro v1.0 model files (kokoro-v1.0.onnx + voices-v1.0.bin)
            # live under /var/lib/tts-raizhost/models/kokoro on the node.
            # See scripts/bootstrap-models.sh for provisioning.
            path: /var/lib/tts-raizhost/models
            type: Directory
        - name: tmp
          emptyDir: {}
