---
# ServiceMonitor for the Next.js web app's /api/metrics surface.
#
# `release: kube-prometheus-stack` is the operator's default
# serviceMonitorSelector — without it Prometheus silently ignores it.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tts-web
  namespace: tts
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/name: tts-web
    app.kubernetes.io/part-of: tts-raizhost
    app.kubernetes.io/component: web
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tts-web
  namespaceSelector:
    matchNames:
      - tts
  endpoints:
    - port: http
      path: /api/metrics
      interval: 30s
      scrapeTimeout: 10s
      relabelings:
        - action: replace
          targetLabel: job
          replacement: tts-web
        - action: replace
          targetLabel: service
          replacement: tts-web
        - action: replace
          targetLabel: component
          replacement: web
