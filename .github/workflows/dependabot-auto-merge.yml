name: Dependabot

# Triggered on every Dependabot PR. Calls the central reusable workflow at
# JadenRazo/dependabot-automation which performs a CVE diff via OSV.dev and
# decides whether to auto-merge or request human review.
on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    uses: JadenRazo/dependabot-automation/.github/workflows/dependabot-auto-merge.yml@main
    secrets: inherit
